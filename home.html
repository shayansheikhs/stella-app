<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella Apps</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, sans-serif;
            background: #0B1220;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box { max-width: 420px; width: 100%; text-align: center; }
        h1 { font-size: 1.6rem; margin-bottom: 8px; color: #7DD3FC; }
        p { color: #9CA3AF; margin-bottom: 28px; font-size: 0.9rem; }
        a {
            display: block;
            padding: 18px;
            margin: 12px 0;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }
        .teach { background: linear-gradient(135deg, #4F46E5, #7C3AED); }
        .chat { background: linear-gradient(135deg, #0284C7, #0EA5E9); }
        .admin { background: linear-gradient(135deg, #7C3AED, #8B5CF6); }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎓 Stella Apps</h1>
        <p>Neeche se app kholo — koi redirect nahi</p>
        <a class="teach" href="teaching/">📚 English Teaching (Full App)</a>
        <a class="chat" href="index.html">💬 AI Connect Chat</a>
        <a class="admin" href="admin.html">🛡️ Admin Dashboard</a>
    </div>
</body>
</html>
