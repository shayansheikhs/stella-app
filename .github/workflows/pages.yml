name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Groq API key
        env:
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -n "$GROQ_KEY" ]; then
            sed -i "s|__GROQ_API_KEY__|$GROQ_KEY|g" app-config.js
            sed -i "s|q=p==null?\"\":p|q=p==null?\"$GROQ_KEY\":p|g" teaching/main.dart.js
            sed -i "s|q=p==null?\"gsk_[^\"]*\":p|q=p==null?\"$GROQ_KEY\":p|g" teaching/main.dart.js
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
